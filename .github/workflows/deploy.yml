name: Deploy to VPS (dev/staging)

on:
  push:
    branches: [dev]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Copy WAR to VPS
        run: |
          scp -i ~/.ssh/deploy_key -o ConnectTimeout=15 target/jobportal.war \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/jobportal/incoming/jobportal.war

      - name: Deploy and restart service
        run: |
          ssh -i ~/.ssh/deploy_key -o ConnectTimeout=15 ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} '
            mv /opt/jobportal/incoming/jobportal.war /opt/jobportal/app.war
            sudo systemctl restart jobportal
            sleep 5
            sudo systemctl status jobportal --no-pager
          '
