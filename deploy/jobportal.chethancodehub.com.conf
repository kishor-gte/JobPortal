# Nginx reverse proxy for JobPortal (dev/staging)
# Install on VPS at: /etc/nginx/sites-available/jobportal.chethancodehub.com
# Then:
#   sudo ln -s /etc/nginx/sites-available/jobportal.chethancodehub.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d jobportal.chethancodehub.com

server {
    listen 80;
    server_name jobportal.chethancodehub.com;

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
