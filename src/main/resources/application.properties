spring.application.name=JobPortal
 
# Database Configuration - Use environment variables in production
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/jobportalnew?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:SMDarif6969}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
 
# JPA Settings
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=${DB_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
# Logging Configuration
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=INFO
logging.level.AUDIT=DEBUG
 
# Audit log file
logging.file.name=logs/audit.log
logging.logback.rollingpolicy.max-file-size=100MB
logging.logback.rollingpolicy.max-history=30
 
# Server Configuration
server.port=8089
# Context path for Tomcat deployment (uncomment if deploying as ROOT)
# server.servlet.context-path=/
 
# Spring MVC & View Configuration
spring.mvc.view.prefix=/views/
spring.mvc.view.suffix=.jsp
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
 
# Static Resources - Critical for Tomcat deployment
spring.web.resources.static-locations=classpath:/static/,file:src/main/webapp/resources/
spring.web.resources.cache.period=3600
spring.mvc.static-path-pattern=/**
 
# File Upload Settings
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB
spring.servlet.multipart.file-size-threshold=2KB
 
# Server Timeout Settings for Large File Uploads
server.tomcat.connection-timeout=300000
server.tomcat.keep-alive-timeout=300000
spring.mvc.async.request-timeout=600000
 
# Gemini AI API Key - Set GEMINI_API_KEY environment variable
gemini.api.key=${GEMINI_API_KEY:}
 
# Static resources
 
# Email Configuration - Set MAIL_USERNAME and MAIL_PASSWORD environment variables
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
 
# Admin email
admin.email=${ADMIN_EMAIL:}
 
# Razorpay Configuration - Set RAZORPAY_KEY_ID and RAZORPAY_KEY_SECRET environment variables
razorpay.key.id=${RAZORPAY_KEY_ID:}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:}
 
# Error Handling - Secure configuration
server.error.whitelabel.enabled=false
server.error.path=/error
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never
 
# Session Configuration
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=${SECURE_COOKIES:false}
server.servlet.session.cookie.same-site=lax

# JWT Configuration
jwt.secret=${JWT_SECRET:5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437}
secure.cookies=${SECURE_COOKIES:false}
server.servlet.session.cookie.path=/
 
# Tomcat Deployment Settings
server.forward-headers-strategy=framework
server.tomcat.relaxed-query-chars=|,{,},[,]
server.tomcat.relaxed-path-chars=|,{,},[,]